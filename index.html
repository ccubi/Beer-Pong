<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beer Pong Event Edition - Bounce Trick</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-user-select: none; user-select: none; }
        html { height: 100%; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif; background: #111; color: white;
            min-height: 100vh; min-height: 100dvh; height: auto;
            overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 5px;
        }
        
        /* HEADER EVENTO */
        .event-header {
            width: 100%; max-width: 360px; background: linear-gradient(135deg, #ffb703 0%, #fb8500 100%);
            padding: 8px; margin-bottom: 4px; border-radius: 10px; text-align: center;
            box-shadow: 0 4px 10px rgba(251, 133, 0, 0.3); border: 2px solid #ef233c; flex-shrink: 0;
        }
        .event-header h1 { font-size: 1.1em; font-weight: 900; color: #111; text-transform: uppercase; letter-spacing: 1px; }
        .event-header p { font-size: 0.75em; color: #ef233c; font-weight: bold; }

        /* AREA GIOCO */
        .game-wrapper { position: relative; width: 100%; max-width: 360px; height: 48vh; height: 48dvh; min-height: 260px; flex-shrink: 0; background: #1a1a1a; border-radius: 12px; border: 3px solid #333; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        canvas { width: 100%; height: 100%; background: #1e2530; display: block; }
        
        /* CONTROLLI IN BASSO */
        .ui-bottom { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 6px; margin-top: 4px; background: #222; padding: 8px; border-radius: 10px; border: 1px solid #444; flex-shrink: 0; }
        .stats-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .stat-box { text-align: center; flex: 1; }
        .stat-box span { display: block; font-size: 0.65em; color: #aaa; text-transform: uppercase; }
        .stat-box strong { font-size: 1.1em; color: #ffb703; }
        
        /* PULSANTE DI LANCIO */
        .launch-btn { width: 100%; background: linear-gradient(90deg, #ffb703, #fb8500); color: #111; border: none; padding: 12px; border-radius: 20px; font-weight: bold; font-size: 1em; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 10px rgba(251,133,0,0.4); }
        .launch-btn:active { transform: scale(0.98); background: #fb8500; }
        
        .btn-reset { background: #444; color: #fff; font-weight: bold; border: none; padding: 6px 12px; border-radius: 12px; cursor: pointer; text-transform: uppercase; font-size: 0.75em; }
        
        /* SCREEN FINE GIOCO */
        .popup-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10, 10, 15, 0.98); display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 15px; z-index: 999; }
        .popup-screen h2 { color: #ffb703; font-size: 1.8em; margin-bottom: 2px; font-weight: 900; }
        
        /* LOGO FORUM */
        .forum-logo { width: 50px; height: 50px; border: 2px solid #ffb703; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; margin-bottom: 6px; }
        .forum-logo .f-top { font-size: 7px; color: #aaa; font-weight: bold; line-height: 1; }
        .forum-logo .f-mid { font-size: 11px; color: #fff; font-weight: 900; line-height: 1.1; }
        .forum-logo .f-bot { font-size: 6px; color: #ef233c; font-weight: bold; line-height: 1; }

        .promo-box { background: linear-gradient(135deg, #1e1e2f 0%, #11111a 100%); border: 2px dashed #ffb703; padding: 10px; border-radius: 10px; margin: 8px 0; width: 100%; }
        .promo-text { color: #fff; font-size: 0.85em; font-weight: bold; text-transform: uppercase; line-height: 1.3; }
        .promo-highlight { color: #ef233c; font-size: 1.1em; font-weight: 900; display: block; margin-top: 2px; }

        .btn-group { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 260px; }
        .social-row { display: flex; gap: 6px; width: 100%; }
        
        .cta-button { background: linear-gradient(90deg, #ffb703, #ffdd00); color: #000; padding: 10px; font-size: 0.85em; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; font-weight: 900; }
        .share-button { background: #00b4d8; color: white; padding: 10px; font-size: 0.85em; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; }
        .btn-instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; flex: 1; padding: 9px; font-size: 0.75em; border-radius: 15px; border: none; font-weight: bold; text-transform: uppercase; }
        .btn-facebook { background: #1877f2; color: white; flex: 1; padding: 9px; font-size: 0.75em; border-radius: 15px; border: none; font-weight: bold; text-transform: uppercase; }

        .instructions { position: absolute; bottom: 15px; left: 0; width: 100%; text-align: center; color: #ffb703; font-weight: bold; font-size: 0.75em; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <!-- HEADER EVENTO -->
    <div class="event-header">
        <h1>🏀 BOUNCE PONG 🏀</h1>
        <p>⚠️ DEVE RIMBALZARE SUL TAVOLO PER ENTRARE! 🍻</p>
    </div>
    
    <!-- AREA CANVAS -->
    <div class="game-wrapper">
        <canvas id="pongCanvas"></canvas>
        <div class="instructions" id="instText">SPOSTA IL MIRINO SUL TAVOLO PER FARE RIMBALZO 🎯</div>
        
        <!-- POPUP FINALE -->
        <div class="popup-screen" id="gameOverScreen">
            <div class="forum-logo">
                <span class="f-top">FORUM</span>
                <span class="f-mid">GIOVANI</span>
                <span class="f-bot">CALABRITTO</span>
            </div>
            <h2>MAGO DEL RIMBALZO! 🏆</h2>
            <p style="font-size: 0.8em; color: #ccc; margin-bottom: 2px;">Tavolo svuotato in <span id="finalShots" style="color: #ffb703; font-weight: bold;">0</span> tiri!</p>
            <p id="starRating" style="font-size: 1.4em; margin-bottom: 4px; letter-spacing: 2px;">⭐⭐⭐</p>
            
            <div class="promo-box">
                <p class="promo-text">Sfida un amico al torneo ufficiale di Beer Pong<span class="promo-highlight">del 27 Luglio a Calabritto!</span></p>
            </div>

            <div class="btn-group">
                <div class="social-row">
                    <button class="btn-instagram" onclick="openSocial('instagram')">📸 Instagram</button>
                    <button class="btn-facebook" onclick="openSocial('facebook')">👥 Facebook</button>
                </div>
                <button class="share-button" onclick="shareGame()">🔗 Condividi la Sfida</button>
                <button class="cta-button" onclick="resetGame()">🔄 Rigioca</button>
            </div>
        </div>
    </div>

    <!-- UI CONTROLLI -->
    <div class="ui-bottom">
        <div class="stats-row">
            <div class="stat-box"><span>Bicchieri</span><strong id="cupsLeft">6</strong></div>
            <button class="launch-btn" id="btnLaunch" onclick="launchBall()">🏀 LANCI CON RIMBALZO! 🏀</button>
            <div class="stat-box"><span>Tiri</span><strong id="shotsFired">0</strong></div>
        </div>
        <div style="text-align: center; margin-top: 2px;">
            <button class="btn-reset" onclick="resetGame()">Reset</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const instText = document.getElementById('instText');
        const btnLaunch = document.getElementById('btnLaunch');
        
        let ball = { x: 0, y: 45, z: 30, vx: 0, vy: 0, vz: 0, r: 15, isMoving: false, trail: [] };
        let cups = [];
        let particles = [];
        let scorePopups = [];
        let shots = 0;
        let isGameOver = false;
        let hasBounced = false; // Controlla se la pallina ha effettuato il rimbalzo obbligatorio
        
        let targetAim = { x: 0, z: 240 }; // Mirino di default a metà tavolo
        let frameCount = 0;

        const GRAVITY = 0.32;
        const TABLE_Z_START = 80;
        const TABLE_Z_END = 490;
        const Z_DEPTH_RANGE = TABLE_Z_END + 80; // profondità totale mappata sull'altezza del canvas
        const LAUNCH_COEF = 1 / 46; // frame necessari alla pallina per scendere a y=0 dato vy iniziale fisso
        const WOBBLE_AMPLITUDE = 9; // ampiezza oscillazione bicchieri (unità di mondo)
        const WOBBLE_SPEED = 0.035; // velocità oscillazione

        const SOCIAL_LINKS = {
            instagram: 'https://www.instagram.com/forumdeigiovani_calabritto/p/Dam6v0rMNQp/', 
            facebook: 'https://www.facebook.com/forumdeigiovani.calabritto/posts/-pronti-a-mettere-alla-prova-mira-riflessi-e-spirito-di-squadra-%C3%A8-il-momento-del/1879115346747493/'     
        };

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        function initCups() {
            cups = [];
            const zRow1 = 445;
            const zRow2 = 400;
            const zRow3 = 355;
            const cRadius = 26;
            
            cups.push({ baseX: -52, x: -52, y: 0, z: zRow1, r: cRadius, active: true, phase: Math.random()*Math.PI*2 });
            cups.push({ baseX: 0,   x: 0,   y: 0, z: zRow1, r: cRadius, active: true, phase: Math.random()*Math.PI*2 });
            cups.push({ baseX: 52,  x: 52,  y: 0, z: zRow1, r: cRadius, active: true, phase: Math.random()*Math.PI*2 });
            cups.push({ baseX: -26, x: -26, y: 0, z: zRow2, r: cRadius, active: true, phase: Math.random()*Math.PI*2 });
            cups.push({ baseX: 26,  x: 26,  y: 0, z: zRow2, r: cRadius, active: true, phase: Math.random()*Math.PI*2 });
            cups.push({ baseX: 0,   x: 0,   y: 0, z: zRow3, r: cRadius, active: true, phase: Math.random()*Math.PI*2 });
        }

        function resetBall() {
            ball.x = 0; ball.y = 45; ball.z = 30; 
            ball.vx = 0; ball.vy = 0; ball.vz = 0;
            ball.isMoving = false;
            ball.trail = [];
            hasBounced = false; // Resetta lo stato del rimbalzo
            btnLaunch.style.opacity = "1";
            btnLaunch.disabled = false;
        }

        function resetGame() {
            shots = 0; isGameOver = false;
            initCups(); resetBall(); updateUI();
            particles = []; scorePopups = [];
            targetAim = { x: 0, z: 240 };
            gameOverScreen.style.display = 'none';
        }

        function updateUI() {
            const active = cups.filter(c => c.active).length;
            document.getElementById('cupsLeft').textContent = active;
            document.getElementById('shotsFired').textContent = shots;
            if(active === 0 && !isGameOver) {
                isGameOver = true;
                setTimeout(() => {
                    gameOverScreen.style.display = 'flex';
                    document.getElementById('finalShots').textContent = shots;
                    let stars = '⭐⭐⭐';
                    if (shots > 12) stars = '⭐';
                    else if (shots > 8) stars = '⭐⭐';
                    document.getElementById('starRating').textContent = stars;
                }, 500);
            }
        }

        canvas.addEventListener('touchstart', handleAim);
        canvas.addEventListener('touchmove', handleAim);
        
        function handleAim(e) {
            if (ball.isMoving || isGameOver) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touchX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
            const touchY = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);
            
            targetAim.x = ((touchX - canvas.width / 2) / (canvas.width / 2)) * 100;
            
            const pctY = 1 - (touchY / canvas.height);
            // Limitiamo il mirino sul tavolo per aiutare il giocatore a scegliere il punto di rimbalzo
            targetAim.z = TABLE_Z_START + (pctY * (TABLE_Z_END - TABLE_Z_START) * 1.1);
            
            if(targetAim.z < 120) targetAim.z = 120;
            if(targetAim.z > 360) targetAim.z = 360; // Impedisce di mirare direttamente oltre i bicchieri
            if(targetAim.x < -70) targetAim.x = -70;
            if(targetAim.x > 70) targetAim.x = 70;
        }

        function launchBall() {
            if (ball.isMoving || isGameOver) return;
            
            const zDiff = targetAim.z - ball.z;
            
            // Calcolo matematico per far atterrare la pallina esattamente sul mirino per il primo rimbalzo
            ball.vx = (targetAim.x - ball.x) * LAUNCH_COEF;
            ball.vz = zDiff * LAUNCH_COEF;
            ball.vy = Math.sqrt(2 * GRAVITY * 65); // Parabola tesa ottimale per il rimbalzo
            
            ball.isMoving = true;
            hasBounced = false;
            shots++;
            btnLaunch.style.opacity = "0.3";
            btnLaunch.disabled = true;
            updateUI();
        }

        function shareGame() {
            const shareText = `Ho ripulito il tavolo con fantastici tiri a rimbalzo in ${shots} tiri! Sfidami al torneo ufficiale del 27 Luglio a Calabritto! 🍻🏀`;
            if (navigator.share) {
                navigator.share({ title: 'Festival Beer Pong', text: shareText, url: window.location.href }).catch(console.error);
            } else {
                navigator.clipboard.writeText(shareText);
                alert("Testo di sfida copiato! Incollalo dove vuoi per sfidare i tuoi amici. 🔥");
            }
        }

        function openSocial(platform) { window.open(SOCIAL_LINKS[platform], '_blank'); }

        function project(x, y, z) {
            const fov = 260; 
            const scale = fov / (fov + z);
            const screenX = canvas.width / 2 + x * scale;
            const screenY = canvas.height * 0.12 - (y * scale) + (z / Z_DEPTH_RANGE) * canvas.height * 0.83;
            return { x: screenX, y: screenY, size: scale };
        }

        function createSplash(x, z) {
            for(let i=0; i<20; i++) {
                particles.push({
                    x: x, y: 10, z: z,
                    vx: (Math.random() - 0.5) * 5,
                    vy: Math.random() * 4 + 3,
                    vz: (Math.random() - 0.5) * 5,
                    color: i % 2 === 0 ? '#ffb703' : '#ffffff',
                    alpha: 1,
                    size: Math.random() * 3 + 2
                });
            }
        }

        function updatePhysics() {
            frameCount++;
            cups.forEach(cup => {
                if (cup.active) {
                    cup.x = cup.baseX + Math.sin(frameCount * WOBBLE_SPEED + cup.phase) * WOBBLE_AMPLITUDE;
                }
            });

            particles.forEach((p, idx) => {
                p.vy -= 0.25; p.x += p.vx; p.y += p.vy; p.z += p.vz; p.alpha -= 0.03;
                if(p.alpha <= 0) particles.splice(idx, 1);
            });

            scorePopups.forEach((pop, idx) => {
                pop.y -= 0.8; pop.alpha -= 0.025;
                if(pop.alpha <= 0) scorePopups.splice(idx, 1);
            });

            if (!ball.isMoving) return;

            ball.trail.push({x: ball.x, y: ball.y, z: ball.z});
            if(ball.trail.length > 4) ball.trail.shift();

            ball.vy -= GRAVITY;
            ball.x += ball.vx;
            ball.y += ball.vy;
            ball.z += ball.vz;

            // RIMBALZO SUL TAVOLO (Fondamentale!)
            if (ball.y <= 0 && ball.z >= TABLE_Z_START && ball.z <= TABLE_Z_END) {
                ball.y = 0;
                ball.vy = -ball.vy * 0.75; // Mantiene una buona spinta verso l'alto dopo il rimbalzo
                ball.vx *= 0.92;
                ball.vz *= 0.92;
                hasBounced = true; // Sblocca la possibilità di fare punto!

                // Se il rimbalzo ha perso troppa energia, la pallina rimbalzerebbe
                // all'infinito con altezza sempre più piccola senza mai uscire dal
                // tavolo: il tiro finisce qui (mancato) invece di bloccare il gioco.
                if (Math.abs(ball.vy) < 1.2) {
                    const scrPosMiss = project(ball.x, 0, ball.z);
                    scorePopups.push({ x: scrPosMiss.x, y: scrPosMiss.y - 5, text: "😅 TIRO FINITO", alpha: 0.9 });
                    resetBall();
                    updateUI();
                    return;
                }
                
                // Effetto grafico del rimbalzo sul tavolo
                const scrPos = project(ball.x, 0, ball.z);
                scorePopups.push({ x: scrPos.x, y: scrPos.y - 5, text: "💥 BOUNCE!", alpha: 0.7 });
            }

            // CONTROLLO ENTRATA NEI BICCHIERI
            if (ball.vy < 0 && ball.y > -5 && ball.y < 35) {
                cups.forEach(cup => {
                    if (!cup.active) return;
                    const distXZ = Math.hypot(ball.x - cup.x, ball.z - cup.z);
                    
                    if (distXZ < cup.r * 0.95 && ball.y <= 22) {
                        if (hasBounced) {
                            // HA RIMBALZATO: PUNTO VALIDATO!
                            cup.active = false;
                            createSplash(cup.x, cup.z);
                            const scrPos = project(cup.x, cup.y + 35, cup.z);
                            scorePopups.push({ x: scrPos.x, y: scrPos.y - 10, text: "🍺 RIMBALZO PERFETTO! 💥", alpha: 1 });
                            resetBall();
                            updateUI();
                        } else {
                            // NON HA RIMBALZATO: Vola via (Malus No-Bounce)
                            ball.vy = 3.5; 
                            ball.vx += (ball.x - cup.x) * 0.1 + (Math.random() - 0.5) * 2;
                            ball.vz += 2;
                            const scrPos = project(cup.x, cup.y + 35, cup.z);
                            scorePopups.push({ x: scrPos.x, y: scrPos.y - 10, text: "❌ NESSUN RIMBALZO!", alpha: 0.9 });
                        }
                    } 
                });
            }

            // Reset se esce fuori dai bordi
            if (ball.z > TABLE_Z_END + 80 || ball.y < -25 || Math.abs(ball.x) > 160) {
                resetBall();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#161920';
            ctx.fillRect(0, canvas.height * 0.25, canvas.width, canvas.height * 0.75);

            const tLeftStart = project(-90, 0, TABLE_Z_START);
            const tRightStart = project(90, 0, TABLE_Z_START);
            const tLeftEnd = project(-55, 0, TABLE_Z_END);
            const tRightEnd = project(55, 0, TABLE_Z_END);

            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.moveTo(tLeftStart.x, tLeftStart.y); ctx.lineTo(tRightStart.x, tRightStart.y);
            ctx.lineTo(tRightEnd.x, tRightEnd.y); ctx.lineTo(tLeftEnd.x, tLeftEnd.y);
            ctx.closePath(); ctx.fill();
            
            ctx.strokeStyle = '#5c2c0e'; ctx.lineWidth = 4; ctx.stroke();

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; ctx.lineWidth = 2;
            const centerStart = project(0, 0, TABLE_Z_START);
            const centerEnd = project(0, 0, TABLE_Z_END);
            ctx.beginPath(); ctx.moveTo(centerStart.x, centerStart.y); ctx.lineTo(centerEnd.x, centerEnd.y); ctx.stroke();

            // MIRINO DI MIRA SUL TAVOLO
            if (!ball.isMoving && !isGameOver) {
                const pTarget = project(targetAim.x, 0, targetAim.z);
                const activeCount = cups.filter(c => c.active).length;
                const aimRadius = 9 + activeCount * 0.9; // si restringe da 14 a 9 man mano che i bicchieri calano
                ctx.strokeStyle = '#ffb703'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(pTarget.x, pTarget.y, aimRadius * pTarget.size, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle = 'rgba(255, 183, 3, 0.2)'; ctx.fill();
            }

            particles.forEach(p => {
                const pt = project(p.x, p.y, p.z);
                ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha;
                ctx.beginPath(); ctx.arc(pt.x, pt.y, p.size * pt.size, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            cups.sort((a,b) => b.z - a.z);
            cups.forEach(cup => {
                const p = project(cup.x, cup.y, cup.z);
                const size = cup.r * p.size;
                
                if (cup.active) {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.beginPath(); ctx.ellipse(p.x, p.y, size, size * 0.3, 0, 0, Math.PI*2); ctx.fill();

                    ctx.fillStyle = '#d90429';
                    ctx.fillRect(p.x - size, p.y, size * 2, size * 1.6);
                    ctx.beginPath(); ctx.arc(p.x, p.y + size * 1.6, size, 0, Math.PI); ctx.fill();

                    ctx.fillStyle = '#f8f9fa';
                    ctx.beginPath(); ctx.ellipse(p.x, p.y, size, size * 0.35, 0, 0, Math.PI * 2); ctx.fill();

                    ctx.fillStyle = '#ffb703';
                    ctx.beginPath(); ctx.ellipse(p.x, p.y + 2, size * 0.85, size * 0.25, 0, 0, Math.PI * 2); ctx.fill();
                }
            });

            if (ball.isMoving) {
                ball.trail.forEach((t, i) => {
                    const pt = project(t.x, t.y, t.z);
                    ctx.fillStyle = `rgba(248, 249, 250, ${0.12 * (i+1)})`;
                    ctx.beginPath(); ctx.arc(pt.x, pt.y, ball.r * pt.size, 0, Math.PI*2); ctx.fill();
                });
            }

            const pBall = project(ball.x, ball.y, ball.z);
            const ballSize = ball.r * pBall.size;

            if (ball.z >= TABLE_Z_START && ball.z <= TABLE_Z_END && ball.y > 0) {
                const pShadow = project(ball.x, 0, ball.z);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.beginPath(); ctx.ellipse(pShadow.x, pShadow.y, ballSize, ballSize * 0.3, 0, 0, Math.PI * 2); ctx.fill();
            }

            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(pBall.x, pBall.y, ballSize, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1.5; ctx.stroke();

            scorePopups.forEach(pop => {
                ctx.fillStyle = `rgba(255, 183, 3, ${pop.alpha})`;
                ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(pop.text, pop.x, pop.y);
            });
        }

        function gameLoop() {
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initCups();
        resetBall();
        updateUI();
        gameLoop();
    </script>
</body>
</html>
